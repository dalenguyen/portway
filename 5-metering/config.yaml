# Post 5 — LiteLLM proxy with per-model pricing and custom metering callback.
# Routes and auth are unchanged from Post 4; pricing + callbacks are the new layer.

model_list:
  - model_name: gpt-oss
    litellm_params:
      model: openai/gpt-oss
      api_base: http://127.0.0.1:8010/v1
      api_key: dummy
      input_cost_per_token: 0.00000015      # NEW — $0.15 / 1M tokens (illustrative)
      output_cost_per_token: 0.00000060     # NEW — $0.60 / 1M tokens
  - model_name: qwen3.5
    litellm_params:
      model: openai/qwen3.5
      api_base: http://127.0.0.1:8011/v1
      api_key: dummy
      input_cost_per_token: 0.00000010      # NEW — $0.10 / 1M tokens
      output_cost_per_token: 0.00000040     # NEW — $0.40 / 1M tokens

general_settings:
  master_key: sk-portway-admin              # admin credential, unchanged from Post 4
  database_url: postgresql://postgres:portway@127.0.0.1:5432/portway
  store_model_in_db: false                  # routes stay in YAML; DB holds keys + spend + portway_metering

litellm_settings:
  drop_params: true
  # CustomLogger instance — the proxy runs on acompletion and invokes
  # async_log_success_event / async_log_failure_event on this object.
  callbacks: ["portway_callback.portway_meter"]
